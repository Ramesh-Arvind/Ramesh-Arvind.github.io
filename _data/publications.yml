- key: naagarajan2025reference
  title: "Automated analysis and textual summarization of time-varying references in advanced greenhouse climate control"
  authors: "Ramesh Arvind Naagarajan, Kiran Kumar Sathyanarayanan, Nadja Bauer, Stefan Streif"
  venue: "Frontiers in Agronomy"
  year: 2025
  month: March
  doi: "10.3389/fagro.2025.1547628"
