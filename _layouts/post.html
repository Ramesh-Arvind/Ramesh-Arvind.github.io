---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }} · {{ page.reading_time | default: '8 min read' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <footer class="post-footer">
    <p class="muted">If you found this useful, you can find me on
      <a href="https://www.linkedin.com/in/{{ site.social.linkedin }}/">LinkedIn</a> or
      <a href="mailto:{{ site.author.email }}">over email</a>.
    </p>
  </footer>
</article>
